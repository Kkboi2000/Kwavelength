<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wavelength</title>
<style>
  :root{
    --navy:#1c3a5e;
    --navy-deep:#15293f;
    --cream:#f4f1e8;
    --red:#d6322e;
    --red-dark:#a81f1c;
    --mint:#9ad3c0;
    --mint-dark:#6bbfa6;
    --orange-head:#e8642a;
    --yellow-head:#f4b400;
    --shadow:rgba(0,0,0,.28);

    /* spectrum band colours (centre -> edge) */
    --band4:#f4b400;
    --band3a:#e8642a;
    --band3b:#e8642a;
    --band2:#9cc3dd;
    --band1a:#f4b400;
    --band1b:#f4b400;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans Thai",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 18%, #2a4c72 0%, #1a3251 45%, #11233a 100%);
    color:var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
    overflow-x:hidden;
    user-select:none;
  }

  /* ---------- top bar ---------- */
  .topbar{
    width:100%;
    max-width:760px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px 4px;
  }
  .gear-btn{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:var(--cream);
    width:46px;height:46px;
    border-radius:50%;
    font-size:22px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .25s ease, background .2s;
  }
  .gear-btn:hover{background:rgba(255,255,255,.16);}
  .gear-btn:active{transform:rotate(60deg);}
  .title-wordmark{
    font-weight:800;
    letter-spacing:.22em;
    font-size:15px;
    text-transform:uppercase;
    opacity:.85;
    text-align:center;
    flex:1;
  }
  .topbar .spacer{width:46px;height:46px;}

  /* ---------- stage ---------- */
  .stage{
    width:100%;
    max-width:760px;
    padding:6px 16px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- dial ----------
     The SVG viewBox is 400x248 but the meaningful dial (top semicircle +
     a sliver of the navy base) lives in the upper ~232px. We crop the wrap
     to that height so the page layout doesn't reserve dead space below the
     centre line, which previously pushed the controls under the starfield. */
  .dial-wrap{
    position:relative;
    width:min(92vw,560px);
    aspect-ratio:400/232;
    margin-top:6px;
    overflow:hidden;
  }
  .dial-svg{
    width:100%;
    display:block;
    overflow:visible;
    /* render at full viewBox proportion, anchored to the top */
    aspect-ratio:400/248;
  }

  .scallop{fill:var(--cream);}
  .dial-face-top{fill:var(--cream);}
  .dial-face-bottom{fill:var(--navy);}
  .star{fill:#ffffff;opacity:.85;}

  .band-num{
    font-weight:800;
    fill:var(--navy-deep);
    font-size:15px;
    text-anchor:middle;
    dominant-baseline:middle;
  }

  /* hidden target overlay */
  .target-shield{
    fill:var(--navy);
    transition:opacity .45s ease;
  }
  .shield-hidden{opacity:0;pointer-events:none;}

  /* pointer (guess needle) */
  #needle-group{transition:transform .15s ease-out;cursor:grab;}
  #needle-group.dragging{cursor:grabbing;transition:none;}
  .needle-stick{stroke:var(--red);stroke-width:11;stroke-linecap:round;}
  .needle-hub-outer{fill:var(--red);}
  .needle-hub-inner{fill:var(--red-dark);opacity:.55;}

  /* crank handle */
  .crank-arm{fill:var(--mint);}
  .crank-knob{fill:var(--mint);}

  /* ---------- clue card ---------- */
  .clue-card{
    position:relative;
    margin-top:14px;
    width:min(86vw,420px);
    background:var(--cream);
    color:var(--navy-deep);
    border-radius:14px;
    box-shadow:0 10px 26px var(--shadow);
    display:flex;
    overflow:hidden;
    min-height:96px;
    z-index:5;
  }
  .clue-half{
    flex:1;
    padding:16px 14px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
  }
  .clue-half.left{background:var(--mint);}
  .clue-half .arrow{font-size:18px;opacity:.7;}
  .clue-half .word{font-weight:800;font-size:clamp(15px,4.4vw,20px);line-height:1.15;}
  .clue-divider{width:2px;background:rgba(0,0,0,.08);}

  /* ---------- controls ---------- */
  .controls{
    margin-top:26px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    width:100%;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:14px 22px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:9px;
    box-shadow:0 6px 16px var(--shadow);
    transition:transform .12s ease, filter .2s;
    color:#fff;
  }
  .btn:active{transform:translateY(2px) scale(.98);}
  .btn-spin{background:linear-gradient(180deg,#e8742f,#d6322e);}
  .btn-reveal{background:linear-gradient(180deg,#7ec9b2,#52a98e);color:#10324a;}
  .btn-next{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.3);}

  .hint{
    margin-top:20px;
    font-size:13px;
    opacity:.6;
    text-align:center;
    max-width:340px;
    line-height:1.5;
  }

  /* ---------- settings modal ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(8,16,28,.62);
    backdrop-filter:blur(3px);
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 16px;
    opacity:0;pointer-events:none;
    transition:opacity .25s ease;
    z-index:50;
    overflow-y:auto;
  }
  .overlay.open{opacity:1;pointer-events:auto;}
  .panel{
    width:100%;max-width:440px;
    background:#fbf9f2;
    color:var(--navy-deep);
    border-radius:20px;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
    transform:translateY(-12px);
    transition:transform .25s ease;
    overflow:hidden;
  }
  .overlay.open .panel{transform:translateY(0);}
  .panel-head{
    background:var(--navy);
    color:var(--cream);
    padding:18px 20px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .panel-head h2{margin:0;font-size:18px;letter-spacing:.04em;}
  .close-x{
    background:transparent;border:none;color:var(--cream);
    font-size:24px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:8px;
  }
  .close-x:hover{background:rgba(255,255,255,.12);}
  .panel-body{padding:18px 20px 24px;}

  .field{margin-bottom:22px;}
  .field-label{
    font-weight:800;font-size:13px;text-transform:uppercase;
    letter-spacing:.06em;opacity:.7;margin-bottom:10px;display:block;
  }

  .seg{
    display:flex;background:#ece7d8;border-radius:12px;padding:4px;gap:4px;
  }
  .seg button{
    flex:1;border:none;background:transparent;padding:10px 6px;
    border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;color:var(--navy-deep);
    transition:background .15s, color .15s;
  }
  .seg button.active{background:var(--navy);color:var(--cream);box-shadow:0 2px 6px rgba(0,0,0,.18);}

  /* custom words area */
  .pairs-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
  .pair-row{display:flex;gap:8px;align-items:center;}
  .pair-row input{
    flex:1;min-width:0;padding:11px 12px;border-radius:10px;
    border:1.5px solid #d8d2c0;background:#fff;font-size:14px;color:var(--navy-deep);
    font-family:inherit;
  }
  .pair-row input:focus{outline:none;border-color:var(--mint-dark);}
  .pair-row .vs{font-size:11px;font-weight:800;opacity:.45;}
  .pair-row .del{
    background:#f0d9d8;color:var(--red-dark);border:none;border-radius:8px;
    width:34px;height:38px;font-size:18px;cursor:pointer;flex-shrink:0;
  }
  .pair-row .del:hover{background:#e7c4c2;}
  .add-pair{
    margin-top:10px;background:var(--mint);color:#10324a;border:none;
    border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer;width:100%;
  }
  .add-pair:hover{filter:brightness(1.04);}
  .custom-note{font-size:12px;opacity:.6;margin-top:8px;line-height:1.4;}
  [hidden]{display:none !important;}

  .credit{
    text-align:center;font-weight:800;letter-spacing:.08em;
    color:var(--navy);opacity:.85;margin-top:6px;font-size:14px;
  }

  /* small screens */
  @media (max-width:420px){
    .btn{padding:13px 16px;font-size:14px;}
    .controls{gap:9px;}
  }
</style>
</head>
<body>

  <div class="topbar">
    <button class="gear-btn" id="gearBtn" aria-label="Settings" title="Settings">⚙️</button>
    <div class="title-wordmark">Wavelength</div>
    <div class="spacer"></div>
  </div>

  <div class="stage">

    <!-- DIAL -->
    <div class="dial-wrap">
      <svg class="dial-svg" id="dialSvg" viewBox="0 0 400 248" aria-label="Wavelength dial">
        <!-- geometry centre = (200,228), radius ~ 196; visible arc is the top semicircle -->
        <defs></defs>

        <!-- scalloped outer ring -->
        <g id="scallopGroup"></g>

        <!-- white top half of face -->
        <path class="dial-face-top" d="M 14 228 A 186 186 0 0 1 386 228 Z"></path>
        <!-- navy bottom half of face -->
        <path class="dial-face-bottom" d="M 14 228 A 186 186 0 0 0 386 228 Z"></path>
        <!-- stars on the navy area -->
        <g id="starGroup"></g>

        <!-- scoring wedges (drawn, then covered by shield) -->
        <g id="wedgeGroup"></g>
        <g id="numGroup"></g>

        <!-- shield that hides the target from the guesser -->
        <path id="targetShield" class="target-shield" d="M 14 228 A 186 186 0 0 1 386 228 Z"></path>

        <!-- crank handle on the right -->
        <g id="crankGroup">
          <rect class="crank-arm" x="384" y="219" width="70" height="18" rx="9"></rect>
          <circle class="crank-knob" cx="452" cy="228" r="15"></circle>
        </g>

        <!-- guess needle -->
        <g id="needle-group">
          <line class="needle-stick" x1="200" y1="228" x2="200" y2="70"></line>
          <circle class="needle-hub-outer" cx="200" cy="228" r="34"></circle>
          <circle class="needle-hub-inner" cx="200" cy="228" r="20"></circle>
        </g>
      </svg>
    </div>

    <!-- CLUE CARD -->
    <div class="clue-card">
      <div class="clue-half left">
        <span class="arrow">←</span>
        <span class="word" id="leftWord">Hot</span>
      </div>
      <div class="clue-divider"></div>
      <div class="clue-half right">
        <span class="arrow">→</span>
        <span class="word" id="rightWord">Cold</span>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="btn btn-spin" id="spinBtn"><span>🎯</span><span data-i18n="spin">Spin target</span></button>
      <button class="btn btn-reveal" id="revealBtn"><span id="revealIcon">👁️</span><span id="revealLabel" data-i18n="reveal">Reveal range</span></button>
      <button class="btn btn-next" id="nextBtn"><span>🔄</span><span data-i18n="next">New words</span></button>
    </div>

    <div class="hint" data-i18n="hint">Spin to hide a secret target, give a one-word clue, then let the guesser drag the red needle. Reveal the range to score.</div>
  </div>

  <!-- SETTINGS -->
  <div class="overlay" id="overlay">
    <div class="panel" role="dialog" aria-modal="true">
      <div class="panel-head">
        <h2 data-i18n="settings">Settings</h2>
        <button class="close-x" id="closeBtn" aria-label="Close">✕</button>
      </div>
      <div class="panel-body">

        <!-- language -->
        <div class="field">
          <label class="field-label" data-i18n="language">Language</label>
          <div class="seg" id="langSeg">
            <button data-lang="en">English</button>
            <button data-lang="th">ไทย</button>
            <button data-lang="ja">日本語</button>
          </div>
        </div>

        <!-- sound -->
        <div class="field">
          <label class="field-label" data-i18n="sound">Sound</label>
          <div class="seg" id="soundSeg">
            <button data-sound="on" data-i18n="on">On</button>
            <button data-sound="off" data-i18n="off">Off</button>
          </div>
        </div>

        <!-- word mode -->
        <div class="field">
          <label class="field-label" data-i18n="words">Words</label>
          <div class="seg" id="wordSeg">
            <button data-mode="default" data-i18n="suggested">Suggested</button>
            <button data-mode="custom" data-i18n="custom">Custom</button>
          </div>

          <!-- custom editor -->
          <div id="customArea" hidden>
            <div class="pairs-list" id="pairsList"></div>
            <button class="add-pair" id="addPairBtn" data-i18n="addpair">+ Add word pair</button>
            <p class="custom-note" data-i18n="customnote">Left word and right word are the two ends of the spectrum.</p>
          </div>
        </div>

        <div class="credit">★ Krit's vibe coding ★</div>
      </div>
    </div>
  </div>

  <script src="words.js"></script>
  <script>
  /* ============================================================
     Wavelength logic  ★ Krit's vibe coding ★
     ============================================================ */
  (function(){
    "use strict";

    // ---- geometry constants (must match the SVG) ----
    const CX = 200, CY = 228, R_FACE = 186;
    const NEEDLE_LEN = 158;          // visual length of the stick
    // Scoring band layout, measured in degrees from the TOP (12 o'clock = 0).
    // Positive = toward the right. Wedges: 2,3,4,3,2 (total span 36° -> 18° each side... we use widths).
    // We'll lay 5 bands centred on a random target angle.
    const BAND_VALUES = [2,3,4,3,2];
    const BAND_WIDTH  = 9;           // degrees per band
    const TOTAL_SPAN  = BAND_VALUES.length * BAND_WIDTH; // 45°
    // Playable angle range for target centre & needle: -78°..+78°
    const PLAY_LIMIT  = 78;

    // ---- i18n ----
    const I18N = {
      en:{settings:"Settings",language:"Language",sound:"Sound",on:"On",off:"Off",
          words:"Words",suggested:"Suggested",custom:"Custom",addpair:"+ Add word pair",
          customnote:"Left word and right word are the two ends of the spectrum.",
          spin:"Spin target",reveal:"Reveal range",hide:"Hide range",next:"New words",
          hint:"Spin to hide a secret target, give a one-word clue, then let the guesser drag the red needle. Reveal the range to score.",
          score:"You scored"},
      th:{settings:"ตั้งค่า",language:"ภาษา",sound:"เสียง",on:"เปิด",off:"ปิด",
          words:"คำ",suggested:"ที่แนะนำ",custom:"กำหนดเอง",addpair:"+ เพิ่มคู่คำ",
          customnote:"คำซ้ายและคำขวาคือสองขั้วของสเปกตรัม",
          spin:"สุ่มเป้าหมาย",reveal:"เผยช่วงคะแนน",hide:"ซ่อนช่วงคะแนน",next:"เปลี่ยนคำ",
          hint:"กดสุ่มเพื่อซ่อนเป้าหมายลับ ใบ้คำหนึ่งคำ แล้วให้ผู้ทายลากเข็มสีแดง จากนั้นเผยช่วงเพื่อให้คะแนน",
          score:"คุณได้"},
      ja:{settings:"設定",language:"言語",sound:"サウンド",on:"オン",off:"オフ",
          words:"お題",suggested:"おすすめ",custom:"カスタム",addpair:"+ お題を追加",
          customnote:"左の言葉と右の言葉がスペクトルの両端です。",
          spin:"ターゲットを回す",reveal:"範囲を見る",hide:"範囲を隠す",next:"次のお題",
          hint:"回して秘密のターゲットを隠し、一言ヒントを出し、回答者に赤い針を動かしてもらいましょう。範囲を表示して採点します。",
          score:"得点は"}
    };

    // ---- state ----
    const state = {
      lang: localStorage.getItem("wl_lang") || "en",
      sound: localStorage.getItem("wl_sound") || "on",
      mode: localStorage.getItem("wl_mode") || "default",
      custom: JSON.parse(localStorage.getItem("wl_custom") || "null"),
      targetAngle: 30,      // degrees from top, centre of band "4"
      needleAngle: 0,
      revealed: true,
      deckIndex: 0
    };

    // ---- element refs ----
    const $ = (id)=>document.getElementById(id);
    const dialSvg=$("dialSvg"), wedgeGroup=$("wedgeGroup"), numGroup=$("numGroup"),
          starGroup=$("starGroup"), scallopGroup=$("scallopGroup"),
          targetShield=$("targetShield"), needleGroup=$("needle-group"),
          leftWord=$("leftWord"), rightWord=$("rightWord"),
          spinSound=$("spinSound");

    // ============================================================
    // Build static dial decorations
    // ============================================================
    function buildScallops(){
      const teeth=44, rIn=R_FACE+2, rOut=R_FACE+14;
      let d="";
      for(let i=0;i<=teeth;i++){
        const a=Math.PI*(i/teeth); // 0..PI across the top
        const ang=Math.PI - a;     // left->right
        const bx=CX+Math.cos(ang)*rIn,  by=CY-Math.sin(ang)*rIn;
        const ox=CX+Math.cos(ang)*rOut, oy=CY-Math.sin(ang)*rOut;
        // simple bump circles
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",ox); c.setAttribute("cy",oy);
        c.setAttribute("r",8); c.setAttribute("class","scallop");
        scallopGroup.appendChild(c);
      }
      // base disc behind everything
      const disc=document.createElementNS("http://www.w3.org/2000/svg","path");
      disc.setAttribute("d",`M ${CX-rOut} ${CY} A ${rOut} ${rOut} 0 0 1 ${CX+rOut} ${CY} Z`);
      disc.setAttribute("class","scallop");
      scallopGroup.insertBefore(disc,scallopGroup.firstChild);
    }

    function buildStars(){
      const n=70;
      for(let i=0;i<n;i++){
        const ang=Math.random()*Math.PI;            // bottom half angle
        const rr=Math.random()*R_FACE*0.95;
        const x=CX+Math.cos(ang)*rr;
        const y=CY+Math.sin(ang)*rr*0.98;           // below centre line
        if(y<CY+4) continue;
        const s=document.createElementNS("http://www.w3.org/2000/svg","circle");
        s.setAttribute("cx",x); s.setAttribute("cy",y);
        s.setAttribute("r",Math.random()*1.3+0.4);
        s.setAttribute("class","star");
        starGroup.appendChild(s);
      }
    }

    // polar helper: angle in degrees from top (+ = right) -> point on circle of radius r
    function polar(angleDeg,r){
      const rad=(angleDeg)*Math.PI/180;
      return { x:CX+Math.sin(rad)*r, y:CY-Math.cos(rad)*r };
    }
    function wedgePath(a0,a1,r){
      const p0=polar(a0,r), p1=polar(a1,r);
      const large=(a1-a0)>180?1:0;
      return `M ${CX} ${CY} L ${p0.x} ${p0.y} A ${r} ${r} 0 ${large} 1 ${p1.x} ${p1.y} Z`;
    }

    // ============================================================
    // Draw scoring bands around current targetAngle
    // ============================================================
    function drawBands(){
      wedgeGroup.innerHTML=""; numGroup.innerHTML="";
      const colors=["var(--band1a)","var(--band2)","var(--band4)","var(--band3a)","var(--band1b)"];
      // proper colour order matching the photo: edge yellow, blue, centre yellow(4), orange, yellow
      const fill=["#f4b400","#9cc3dd","#f4b400","#e8642a","#f4b400"];
      // Actually replicate photo: 2(yellow) 3(orange) 4(blue-ish?) ... keep it clean & readable:
      const palette=["#f3b50a","#e8642a","#f3b50a","#e8642a","#f3b50a"];
      const start=state.targetAngle - TOTAL_SPAN/2;
      for(let i=0;i<BAND_VALUES.length;i++){
        const a0=start+i*BAND_WIDTH, a1=a0+BAND_WIDTH;
        const path=document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d",wedgePath(a0,a1,R_FACE-2));
        // centre band = 4 (blue), flanks 3 (orange), outer 2 (yellow) — like the photo
        const photoFill=["#f3b50a","#e8642a","#9cc3dd","#e8642a","#f3b50a"];
        path.setAttribute("fill",photoFill[i]);
        wedgeGroup.appendChild(path);

        const mid=(a0+a1)/2;
        const np=polar(mid,R_FACE-22);
        const t=document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",np.x); t.setAttribute("y",np.y);
        t.setAttribute("class","band-num");
        t.textContent=BAND_VALUES[i];
        numGroup.appendChild(t);
      }
    }

    // ============================================================
    // Needle + shield
    // ============================================================
    function setNeedle(angle){
      state.needleAngle=clamp(angle,-PLAY_LIMIT,PLAY_LIMIT);
      needleGroup.setAttribute("transform",`rotate(${state.needleAngle} ${CX} ${CY})`);
    }
    function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

    function applyReveal(){
      const icon=$("revealIcon"), label=$("revealLabel");
      if(state.revealed){
        targetShield.classList.add("shield-hidden");
        icon.textContent="🙈";
        label.textContent=t("hide");
      }else{
        targetShield.classList.remove("shield-hidden");
        icon.textContent="👁️";
        label.textContent=t("reveal");
      }
    }

    // ============================================================
    // Spin: animate to a random target then settle
    // ============================================================
    let spinning=false;
    function spinTarget(){
      if(spinning) return;
      spinning=true;
      // hide range for the guesser at start of a round
      state.revealed=false; applyReveal();
      playSound();

      const finalAngle=(Math.random()*2-1)*PLAY_LIMIT*0.82; // keep bands fully on-face
      const startAngle=state.targetAngle;
      const dur=1100, t0=performance.now();
      // a little overshoot wobble
      const swings=2.2;
      function frame(now){
        const p=Math.min(1,(now-t0)/dur);
        const ease=1-Math.pow(1-p,3);
        const wobble=Math.sin(p*Math.PI*swings)*(1-p)*22;
        state.targetAngle=startAngle+(finalAngle-startAngle)*ease+wobble;
        drawBands();
        if(p<1){requestAnimationFrame(frame);}
        else{
          state.targetAngle=finalAngle;
          drawBands();
          spinning=false;
        }
      }
      requestAnimationFrame(frame);
    }

    function playSound(){
      if(state.sound!=="on") return;
      try{ spinSound.currentTime=0; const pr=spinSound.play(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){}
    }

    // ============================================================
    // Words deck
    // ============================================================
    function activeDeck(){
      if(state.mode==="custom" && state.custom && state.custom.length){
        return state.custom;
      }
      return (window.WAVELENGTH_WORDS && window.WAVELENGTH_WORDS[state.lang]) || window.WAVELENGTH_WORDS.en;
    }
    function showWords(){
      const deck=activeDeck();
      if(!deck.length){ leftWord.textContent="—"; rightWord.textContent="—"; return;}
      state.deckIndex=((state.deckIndex%deck.length)+deck.length)%deck.length;
      const pair=deck[state.deckIndex];
      leftWord.textContent=pair.left||"—";
      rightWord.textContent=pair.right||"—";
    }
    function nextWords(){
      const deck=activeDeck();
      if(deck.length>1){
        let n; do{ n=Math.floor(Math.random()*deck.length);}while(n===state.deckIndex);
        state.deckIndex=n;
      }
      showWords();
    }

    // ============================================================
    // Needle drag (pointer + touch)
    // ============================================================
    function angleFromEvent(clientX,clientY){
      const rect=dialSvg.getBoundingClientRect();
      const scaleX=400/rect.width, scaleY=248/rect.height;
      const x=(clientX-rect.left)*scaleX;
      const y=(clientY-rect.top)*scaleY;
      const dx=x-CX, dy=y-CY;
      let deg=Math.atan2(dx,-dy)*180/Math.PI; // 0 at top, + to right
      return clamp(deg,-PLAY_LIMIT,PLAY_LIMIT);
    }
    let dragging=false;

    // Only allow a drag to begin if the pointer is on the upper dial face
    // (above the centre line and inside the face radius). This keeps the
    // needle grabbable anywhere on the white/wedge area while preventing
    // clicks on the base, crank, or empty canvas from snapping it.
    function onUpperFace(clientX,clientY){
      const rect=dialSvg.getBoundingClientRect();
      const scaleX=400/rect.width, scaleY=248/rect.height;
      const x=(clientX-rect.left)*scaleX;
      const y=(clientY-rect.top)*scaleY;
      const dx=x-CX, dy=y-CY;
      const dist=Math.hypot(dx,dy);
      return (y <= CY+2) && (dist <= R_FACE+12);
    }

    function startDrag(e){
      const pt=e.touches?e.touches[0]:e;
      if(!onUpperFace(pt.clientX,pt.clientY)) return;
      dragging=true; needleGroup.classList.add("dragging");
      setNeedle(angleFromEvent(pt.clientX,pt.clientY));
      e.preventDefault();
    }
    function moveDrag(e){
      if(!dragging) return;
      const pt=e.touches?e.touches[0]:e;
      setNeedle(angleFromEvent(pt.clientX,pt.clientY));
      e.preventDefault();
    }
    function endDrag(){ dragging=false; needleGroup.classList.remove("dragging"); }

    dialSvg.addEventListener("mousedown",startDrag);
    window.addEventListener("mousemove",moveDrag);
    window.addEventListener("mouseup",endDrag);
    dialSvg.addEventListener("touchstart",startDrag,{passive:false});
    window.addEventListener("touchmove",moveDrag,{passive:false});
    window.addEventListener("touchend",endDrag);

    // ============================================================
    // i18n apply
    // ============================================================
    function t(key){ return (I18N[state.lang]&&I18N[state.lang][key])||I18N.en[key]||key; }
    function applyI18n(){
      document.documentElement.lang=state.lang;
      document.querySelectorAll("[data-i18n]").forEach(el=>{
        el.textContent=t(el.getAttribute("data-i18n"));
      });
      applyReveal(); // refresh reveal/hide label
    }

    // ============================================================
    // Settings UI
    // ============================================================
    const overlay=$("overlay");
    function openSettings(){ overlay.classList.add("open"); syncSegs(); }
    function closeSettings(){ overlay.classList.remove("open"); }

    $("gearBtn").addEventListener("click",openSettings);
    $("closeBtn").addEventListener("click",closeSettings);
    overlay.addEventListener("click",(e)=>{ if(e.target===overlay) closeSettings(); });

    function syncSegs(){
      document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("active",b.dataset.lang===state.lang));
      document.querySelectorAll("#soundSeg button").forEach(b=>b.classList.toggle("active",b.dataset.sound===state.sound));
      document.querySelectorAll("#wordSeg button").forEach(b=>b.classList.toggle("active",b.dataset.mode===state.mode));
      $("customArea").hidden = state.mode!=="custom";
    }

    document.querySelectorAll("#langSeg button").forEach(b=>{
      b.addEventListener("click",()=>{
        state.lang=b.dataset.lang; localStorage.setItem("wl_lang",state.lang);
        applyI18n(); syncSegs();
        if(state.mode!=="custom"){ state.deckIndex=0; showWords(); }
      });
    });
    document.querySelectorAll("#soundSeg button").forEach(b=>{
      b.addEventListener("click",()=>{
        state.sound=b.dataset.sound; localStorage.setItem("wl_sound",state.sound);
        syncSegs(); if(state.sound==="on") playSound();
      });
    });
    document.querySelectorAll("#wordSeg button").forEach(b=>{
      b.addEventListener("click",()=>{
        state.mode=b.dataset.mode; localStorage.setItem("wl_mode",state.mode);
        if(state.mode==="custom") ensureCustomSeed();
        syncSegs(); renderPairs(); state.deckIndex=0; showWords();
      });
    });

    // ----- custom pairs editor -----
    const pairsList=$("pairsList");
    function ensureCustomSeed(){
      if(!state.custom || !state.custom.length){
        // seed with a couple from current language so the user has a starting point
        const base=(window.WAVELENGTH_WORDS[state.lang]||[]).slice(0,3)
                   .map(p=>({left:p.left,right:p.right}));
        state.custom = base.length?base:[{left:"",right:""}];
        saveCustom();
      }
    }
    function saveCustom(){ localStorage.setItem("wl_custom",JSON.stringify(state.custom)); }
    function renderPairs(){
      if(state.mode!=="custom"){ return; }
      ensureCustomSeed();
      pairsList.innerHTML="";
      state.custom.forEach((pair,idx)=>{
        const row=document.createElement("div"); row.className="pair-row";
        const l=document.createElement("input");
        l.type="text"; l.value=pair.left||""; l.placeholder=t("words")+" ←";
        l.addEventListener("input",()=>{ state.custom[idx].left=l.value; saveCustom(); showWords(); });
        const vs=document.createElement("span"); vs.className="vs"; vs.textContent="VS";
        const r=document.createElement("input");
        r.type="text"; r.value=pair.right||""; r.placeholder="→ "+t("words");
        r.addEventListener("input",()=>{ state.custom[idx].right=r.value; saveCustom(); showWords(); });
        const del=document.createElement("button");
        del.className="del"; del.textContent="×"; del.title="remove";
        del.addEventListener("click",()=>{
          state.custom.splice(idx,1);
          if(!state.custom.length) state.custom.push({left:"",right:""});
          saveCustom(); renderPairs(); state.deckIndex=0; showWords();
        });
        row.append(l,vs,r,del);
        pairsList.appendChild(row);
      });
    }
    $("addPairBtn").addEventListener("click",()=>{
      ensureCustomSeed();
      state.custom.push({left:"",right:""});
      saveCustom(); renderPairs();
    });

    // ============================================================
    // Main controls
    // ============================================================
    $("spinBtn").addEventListener("click",spinTarget);
    $("revealBtn").addEventListener("click",()=>{
      state.revealed=!state.revealed; applyReveal();
    });
    $("nextBtn").addEventListener("click",nextWords);

    // ============================================================
    // Init
    // ============================================================
    function init(){
      buildScallops();
      buildStars();
      drawBands();
      setNeedle(0);
      state.revealed=true; applyReveal();
      applyI18n();
      syncSegs();
      if(state.mode==="custom"){ ensureCustomSeed(); renderPairs(); }
      showWords();
    }
    init();
  })();
  </script>
</body>
</html>
